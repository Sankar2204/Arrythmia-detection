<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Heart Factory - Upload ECG</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav class="navbar">
        <a href="/" class="nav-brand">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="28" height="28">
                <path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/>
            </svg>
            Your Heart Factory
        </a>
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle Theme"></button>
    </nav>

    <div class="upload-wrapper">
        <div class="glass-container upload-container fade-in">
            <header style="margin-bottom: 2rem;">
                <h1 id="patientNameHeader" style="margin:0; font-size:2rem; font-weight:700;">Welcome</h1>
                <p style="color:var(--text-secondary); font-size:1.1rem; margin-top:0.5rem;">Upload ECG CSV data to begin AI diagnosis</p>
            </header>

            <main>
                <div class="upload-section" id="uploadSection">
                    <div class="drag-drop-zone" id="dropZone">
                        <div class="upload-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
                        </div>
                        <p class="drop-text">Drag & Drop your ECG CSV file here</p>
                        <p class="or-text">or</p>
                        <label for="fileInput" class="browse-btn">Browse Files</label>
                        <input type="file" id="fileInput" accept=".csv" style="display: none;" />
                    </div>
                    
                    <div class="file-preview" id="filePreview" style="display: none;">
                        <p class="file-name" id="fileNameDisplay">
                            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><polyline points="13 2 13 9 20 9"/></svg>
                            <span></span>
                        </p>
                        <p class="file-size" id="fileSizeDisplay"></p>
                        <div class="preview-data" id="previewData"></div>
                    </div>

                    <button id="predictBtn" class="primary-btn glow-btn" disabled>
                        <span>Analyze ECG Data</span>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
                    </button>
                </div>

                <!-- Loader section with stages -->
                <div class="loader-container" id="loaderContainer" style="display: none;">
                    <div class="ecg-wave-loader">
                        <!-- CSS drawn ECG -->
                        <svg viewBox="0 0 100 20" class="ecg-line">
                            <polyline points="0,10 20,10 25,5 30,15 35,0 40,20 45,10 100,10" fill="none" stroke="currentColor" stroke-width="2" />
                        </svg>
                    </div>
                    <h3 id="loaderText" style="margin-top:2rem; font-weight:600; font-size:1.3rem;">Initializing...</h3>
                    <div class="loader-stages">
                        <span class="stage active" id="stage1">Uploading</span>
                        <span class="stage" id="stage2">Processing</span>
                        <span class="stage" id="stage3">Predicting</span>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/global.js') }}"></script>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
